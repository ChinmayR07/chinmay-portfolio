name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint · Type Check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Required for build — actual values set in Vercel env vars
          NEXT_PUBLIC_SITE_URL: https://chinmayraichur.me
          NEXT_PUBLIC_GITHUB_USERNAME: chinmayraichur
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: placeholder
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: placeholder
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
